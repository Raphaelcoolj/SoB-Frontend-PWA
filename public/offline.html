<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoB - Offline</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #09090b;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #71717a; font-size: 0.9rem; }
    button {
      margin-top: 24px;
      padding: 10px 24px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 9999px;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>You're offline</h1>
  <p>SoB needs an internet connection to load new content.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
